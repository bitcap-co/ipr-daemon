name: Build/Release IPR Daemon Binaries
on:
  push:
    tags:
      - "v*"
env:
  GO_VERSION: "1.24.0"
  LIBPCAP_VERSION: 1.10.3
  FREEBSD_VERSION: 14.3

jobs:
  linux-amd64:
    name: Linux amd64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y wget git gcc make flex bison
      - uses: actions/setup-go@v6
        with:
          go-version: "${{ env.GO_VERSION }}"

      - name: Prepare libpcap
        run: |
          export LIBPCAP_VERSION=${{ env.LIBPCAP_VERSION }}
          wget -qO - https://www.tcpdump.org/release/libpcap-${LIBPCAP_VERSION}.tar.gz | tar zvxf -
      - name: Build libpcap-${{ env.LIBPCAP_VERSION }} from source
        run: |
          cd libpcap-${LIBPCAP_VERSION}
          ./configure --disable-dbus
          make
          sudo make install
      - name: Build amd64 binary
        run: |
          make .linux-amd64
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: iprd-build-${{ runner.os }}-${{ runner.arch }}
          path: dist/iprd*
          retention-days: 1

  macos:
    name: MacOS x86/arm64
    strategy:
      matrix:
        include:
          - os: macos-15-intel
            arch: x64
          - os: macos-15
            arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "${{ env.GO_VERSION }}"
      - name: Setup build environment
        run: |
          brew update
          brew install make
      - name: Prepare libpcap
        run: |
          export BASEDIR=$(pwd)
          export LIBPCAP_VERSION=${{ env.LIBPCAP_VERSION }}
          wget -qO - https://www.tcpdump.org/release/libpcap-${LIBPCAP_VERSION}.tar.gz | tar zvxf -

          cd ${BASEDIR}/libpcap-${LIBPCAP_VERSION}
          ./configure --disable-dbus
          make
          sudo make install

      - name: Build MacOS binary
        run: |
          make darwin

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: iprd-build-${{ runner.os }}-${{ runner.arch }}
          path: dist/iprd*
          retention-days: 1

  freebsd:
    name: FreeBSD amd64
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Prepare in FreeBSD virtual machine
        uses: vmactions/freebsd-vm@v1
        with:
          release: "${{ env.FREEBSD_VERSION }}"
          usesh: true
          prepare: |
            pkg install -y git gmake go libpcap amd64-binutils
          run: |
            ls -la /usr/local/bin
            export PATH=/usr/local/bin:$PATH
            go version
            git config --global --add safe.directory /home/runner/work/ipr-daemon/ipr-daemon
            FREEBSD_VERSION=${{ env.FREEBSD_VERSION }} gmake freebsd-binaries
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: iprd-build-freebsd-X64
          path: dist/iprd*
          retention-days: 1

  windows:
    name: Windows amd64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "${{ env.GO_VERSION }}"
      - name: Setup Npcap SDK
        run: |
          Invoke-WebRequest -Uri "https://npcap.com/dist/npcap-sdk-1.13.zip" -OutFile npcap-sdk.zip
          Expand-Archive -Path npcap-sdk.zip -DestinationPath npcap-sdk
        shell: pwsh
      - name: Build Windows amd64 binary
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $sdk = "$env:GITHUB_WORKSPACE/npcap-sdk"
          $env:CGO_ENABLED = "1"
          $env:CGO_CFLAGS = "-I$sdk/Include"
          $env:CGO_LDFLAGS = "-L$sdk/Lib/x64"
          go build -ldflags="-s -w" -o "dist/iprd-${{ github.ref_name }}-windows-amd64.exe" ./cmd/main.go
        shell: pwsh
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: iprd-build-${{ runner.os }}-${{ runner.arch }}
          path: dist/iprd*
          retention-days: 1

  release:
    name: Create release
    permissions:
      contents: write
    needs: [linux-amd64, macos, freebsd, windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Write artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          name: IPR Daemon ${{ github.ref_name }} Release
          draft: true
          prerelease: true
          files: |
            ${{ github.workspace }}/artifacts/iprd-build-*-*/iprd*
