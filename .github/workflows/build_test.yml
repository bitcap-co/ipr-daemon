# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Build and release iprd binary
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
    - name: Checkout repository 
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.24.5'

    - name: update apt sources
      shell: bash
      run: sudo apt update
    
    - name: Get build dependencies
      run: sudo apt install libpcap-dev libcap-dev librdmacm-dev libibverbs-dev libsystemd-dev

    - name: Get project dependencies
      run: go mod download

    - name: Build static binary
      run: CGO_ENABLED=1 go build -tags netgo -ldflags "-linkmode 'external' -extldflags '-static -ldbus-1 -lsystemd -lpcap -lcap -libverbs -lnl-route-3 -lnl-3'" -o iprd-${{ github.ref_name}}-${{ runner.os }}-${{ runner.arch }} cmd/main.go
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ runner.os }}-${{ runner.arch }}
        path: |
          iprd*
  release:
    name: Create draft release
    permissions:
      contents: write
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Download and extract artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          name: IPR Daemon ${{ github.ref_name }} draft release
          draft: true
          prerelease: true
          files: |
            ${{ github.workspace }}/artifacts/iprd*
